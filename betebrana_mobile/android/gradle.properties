org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Disable Kotlin incremental compilation.
# REQUIRED: Flutter plugin packages are cached on C:\ but this project is on E:\.
# Kotlin's incremental compiler cannot compute relative paths across different
# Windows drive letters, causing the Kotlin daemon to crash with IllegalArgumentException.
kotlin.incremental=false
